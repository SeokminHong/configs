name: Publish
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish'
        required: true
        type: choice
        options:
          - 'current'
          - 'patch'
          - 'minor'
          - 'major'
        default: 'patch'
      dry-run:
        description: 'Dry run'
        required: false
        type: boolean
        default: false
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup git config
        run: |
          git config --global user.email "ghdtjrald240@gmail.com"
          git config --global user.name "Seokmin (GitHub Actions)"
      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      # Setup .npmrc file to publish to npm
      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          registry-url: 'https://registry.npmjs.org'
      # Bump version
      - name: Bump version
        id: version
        shell: bash
        env:
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          if [[ "$VERSION_INPUT" == "current" ]]; then
            version="v$(node -p "require('./package.json').version")"
            if ! git rev-parse --verify --quiet "refs/tags/${version}" >/dev/null; then
              git tag -a "$version" -m "Bump version to ${version#v}"
            fi
          else
            version=$(npm version "$VERSION_INPUT" -m "Bump version to %s")
          fi
          echo "version=${version}" >> $GITHUB_OUTPUT
      # Push changes
      - name: Push changes
        run: git push -u origin --follow-tags ${{ github.event.inputs.dry-run == 'true' && '--dry-run' || '' }}
      - name: Publish to npm
        run: npm publish --provenance --access public ${{ github.event.inputs.dry-run == 'true' && '--dry-run' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      # Create a release
      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.event.inputs.dry-run != 'true'
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
